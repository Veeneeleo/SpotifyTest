<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Spotify Seek Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: system-ui, Arial; max-width: 900px; margin: 24px auto; padding: 0 16px; }
    input, button, select { padding: 8px; font-size: 14px; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin: 8px 0; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 12px; margin-top: 12px; }
    .track { padding: 8px; border-bottom: 1px solid #eee; display:flex; justify-content:space-between; gap: 12px; }
    .track:last-child { border-bottom: none; }
    .muted { color: #666; }
    .danger { color: #b00020; }
  </style>
</head>
<body>

<h1>Spotify Web API — Play + Seek</h1>

<div class="card">
  <div class="row">
    <button id="loginBtn">Login</button>
    <button id="logoutBtn">Logout</button>
  </div>
  <div id="authStatus"></div>
</div>

<div class="card">
  <h2>Devices</h2>
  <div class="row">
    <button id="refreshDevicesBtn">Refresh Devices</button>
    <select id="deviceSelect"></select>
    <button id="transferBtn">Transfer</button>
  </div>
</div>

<div class="card">
  <h2>Search + Play</h2>
  <div class="row">
    <input id="query" style="min-width:360px" placeholder="Search for a track..." />
    <button id="searchBtn">Search</button>
  </div>
  <div id="results"></div>
</div>

<div class="card">
  <h2>Seek</h2>
  <div class="row">
    <input id="seekMs" type="number" value="9600" min="0" />
    <button id="seekBtn">Seek</button>
  </div>
</div>

<div class="card">
  <h2>Log</h2>
  <pre id="log" style="white-space:pre-wrap;"></pre>
</div>

<script>
(() => {

const CLIENT_ID = "81cff1fc219b442abfb47d9a3bba8960";
const REDIRECT_URI = "https://veeneeleo.github.io/SpotifyTest/";
const AUTH_ENDPOINT = "https://accounts.spotify.com/authorize";
const TOKEN_ENDPOINT = "https://accounts.spotify.com/api/token";
const API_BASE = "https://api.spotify.com/v1";

const SCOPES = "user-read-playback-state user-modify-playback-state";

const LS = {
  access: "sp_access",
  refresh: "sp_refresh",
  exp: "sp_exp",
  verifier: "sp_verifier"
};

const $ = id => document.getElementById(id);
const log = msg => $("log").textContent = msg + "\n" + $("log").textContent;

function base64url(bytes) {
  return btoa(String.fromCharCode(...new Uint8Array(bytes)))
    .replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}

async function sha256(plain) {
  const enc = new TextEncoder().encode(plain);
  return await crypto.subtle.digest("SHA-256", enc);
}

function randomString(len=64){
  const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
  return Array.from(crypto.getRandomValues(new Uint8Array(len)))
    .map(x=>chars[x%chars.length]).join("");
}

async function login(){
  const verifier=randomString(64);
  localStorage.setItem(LS.verifier,verifier);
  const challenge=base64url(await sha256(verifier));

  const params=new URLSearchParams({
    response_type:"code",
    client_id:CLIENT_ID,
    scope:SCOPES,
    redirect_uri:REDIRECT_URI,
    code_challenge_method:"S256",
    code_challenge:challenge
  });

  window.location=`${AUTH_ENDPOINT}?${params.toString()}`;
}

async function exchangeCode(){
  const url=new URL(window.location);
  const code=url.searchParams.get("code");
  if(!code) return;

  const verifier=localStorage.getItem(LS.verifier);
  const body=new URLSearchParams({
    client_id:CLIENT_ID,
    grant_type:"authorization_code",
    code,
    redirect_uri:REDIRECT_URI,
    code_verifier:verifier
  });

  const resp=await fetch(TOKEN_ENDPOINT,{
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body
  });

  const data=await resp.json();
  localStorage.setItem(LS.access,data.access_token);
  localStorage.setItem(LS.refresh,data.refresh_token);
  localStorage.setItem(LS.exp,Date.now()+data.expires_in*1000);

  url.searchParams.delete("code");
  history.replaceState({},document.title,url.toString());
  setAuthStatus();
}

function getToken(){
  return localStorage.getItem(LS.access);
}

function setAuthStatus(){
  $("authStatus").innerHTML=getToken()
    ? "✅ Logged in"
    : "<span class='danger'>❌ Not logged in</span>";
}

async function api(path,{method="GET",query=null,json=null,deviceId=null}={}){
  const token=getToken();
  const url=new URL(API_BASE+path);
  if(query) Object.entries(query).forEach(([k,v])=>url.searchParams.set(k,v));
  if(deviceId) url.searchParams.set("device_id",deviceId);

  const resp=await fetch(url,{
    method,
    headers:{
      "Authorization":`Bearer ${token}`,
      ...(json?{"Content-Type":"application/json"}:{})
    },
    body:json?JSON.stringify(json):undefined
  });

  if(resp.status===204) return null;
  return resp.json();
}

async function refreshDevices(){
  const data=await api("/me/player/devices");
  const sel=$("deviceSelect");
  sel.innerHTML="";
  data.devices.forEach(d=>{
    const opt=document.createElement("option");
    opt.value=d.id;
    opt.textContent=`${d.name} (${d.type})`;
    if(d.is_active) opt.selected=true;
    sel.appendChild(opt);
  });
}

async function transfer(){
  const device_id=$("deviceSelect").value;
  await api("/me/player",{method:"PUT",json:{device_ids:[device_id],play:true}});
}

async function search(){
  const q=$("query").value;
  const data=await api("/search",{query:{q,type:"track",limit:5}});
  const results=$("results");
  results.innerHTML="";
  data.tracks.items.forEach(t=>{
    const div=document.createElement("div");
    div.className="track";
    div.innerHTML=`<div><strong>${t.name}</strong> - ${t.artists[0].name}</div>
                   <button data-uri="${t.uri}">Play</button>`;
    div.querySelector("button").onclick=()=>play(t.uri);
    results.appendChild(div);
  });
}

async function play(uri){
  const device_id=$("deviceSelect").value;
  await api("/me/player/play",{method:"PUT",deviceId:device_id,json:{uris:[uri]}});
}

async function seek(){
  const device_id=$("deviceSelect").value;
  const position_ms=$("seekMs").value;
  await api("/me/player/seek",{method:"PUT",deviceId:device_id,query:{position_ms}});
  log("Seeked to "+position_ms+" ms");
}

$("loginBtn").onclick=login;
$("logoutBtn").onclick=()=>{localStorage.clear();setAuthStatus();}
$("refreshDevicesBtn").onclick=refreshDevices;
$("transferBtn").onclick=transfer;
$("searchBtn").onclick=search;
$("seekBtn").onclick=seek;

exchangeCode();
setAuthStatus();

})();
</script>

</body>
</html>
